# Render deployment manifest — see https://render.com/docs/blueprint-spec
#
# Three resources:
#   1. cli-market-db        Postgres database shared between API + collector
#   2. cli-market-api       Web service (FastAPI) — public, behind /health probe
#   3. cli-market-collector Background worker — runs the price collector daemon
#
# Architecture rationale:
#   Previously, the API and collector shared a single Python process and a
#   SQLite file on the API's filesystem. That meant:
#     - The collector competed with uvicorn for CPU and SQLite write locks
#       during PARALLEL=30 batches.
#     - SQLite on Render's filesystem is ephemeral on redeploy; data moat
#       was at constant risk.
#     - There was no way to scale the API independently of the collector.
#
#   Splitting into web + worker + shared Postgres fixes all three. Both
#   services connect to the same Postgres via DATABASE_URL injected from
#   the database resource. The codebase already auto-detects Postgres
#   when DATABASE_URL is set (see market_core.USE_PG).
#
# Data migration note:
#   On first deploy with this manifest, the existing SQLite data on the
#   API service is NOT migrated. The collector's first cycle will
#   repopulate the data moat. If you have production data worth keeping,
#   run a one-off SQLite → Postgres dump BEFORE merging this.

databases:
  - name: cli-market-db
    plan: free
    databaseName: cli_market
    user: cli_market

services:
  # ── API (public) ──────────────────────────────────────────────────────────
  - type: web
    name: cli-market-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn market_server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: MARKET_API_TOKEN
        sync: false
        value: changeme-set-in-render-dashboard
      - key: MARKET_DATA_DIR
        value: /opt/render/project/src/.market
      - key: CORS_ORIGINS
        value: "https://cli-market.dev,https://procure-copilot.vercel.app,http://localhost:3000"
      - key: DATABASE_URL
        fromDatabase:
          name: cli-market-db
          property: connectionString

  # ── Collector (background worker, no public ports) ────────────────────────
  - type: worker
    name: cli-market-collector
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python collect_prices.py --daemon
    envVars:
      - key: COLLECT_INTERVAL_HOURS
        value: "8"
      - key: COLLECT_PARALLEL
        value: "30"
      - key: MARKET_DATA_DIR
        # Local cache (last_search.json, etc.) — independent of the API's dir.
        value: /opt/render/project/src/.market
      - key: DATABASE_URL
        fromDatabase:
          name: cli-market-db
          property: connectionString
