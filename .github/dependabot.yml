# Dependabot — CLI Market (cli-market-world)
# landing/.npmrc + npmjs replaces-base → public npm only (no GH Packages auth)

version: 2

registries:
  npmjs:
    type: npm-registry
    url: https://registry.npmjs.org
    replaces-base: true

updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - security
    commit-message:
      prefix: deps
      include: scope

  - package-ecosystem: npm
    directory: /landing
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - landing
    commit-message:
      prefix: deps
      include: scope
    registries:
      - npmjs

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci-cd
