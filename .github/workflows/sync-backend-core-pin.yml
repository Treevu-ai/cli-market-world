name: Sync backend core pin

on:
  workflow_dispatch:
    inputs:
      version:
        description: cli-market-core minimum version (e.g. 1.9.35)
        type: string
        default: "1.9.35"
  push:
    branches: [main]
    paths:
      - ops/backend-pin.trigger

permissions:
  contents: read

jobs:
  bump-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/checkout@v6
        with:
          repository: Treevu-ai/cli-market-backend
          ref: main
          path: cli-market-backend
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify PyPI version exists
        run: |
          VER="${{ github.event.inputs.version || '1.9.35' }}"
          echo "CORE_PIN_VER=${VER}" >> "$GITHUB_ENV"
          python3 -m pip index versions "cli-market-core" | grep -qE "(^|[[:space:]])${VER}([,[:space:]]|$)"

      - name: Bump backend requirements.txt
        env:
          BACKEND_DIR: ${{ github.workspace }}/cli-market-backend
        run: |
          chmod +x ops/sync_backend_core_pin.sh
          ./ops/sync_backend_core_pin.sh "${CORE_PIN_VER}"

      - name: Save patch artifact (always)
        if: always()
        run: |
          VER="${CORE_PIN_VER}"
          mkdir -p /tmp/backend-pin
          cp cli-market-backend/requirements.txt /tmp/backend-pin/requirements.txt
          git -C cli-market-backend diff requirements.txt > "/tmp/backend-pin/requirements-${VER}.patch" || true
          if [ ! -s "/tmp/backend-pin/requirements-${VER}.patch" ]; then
            echo "No diff — backend already at cli-market-core>=${VER}" > "/tmp/backend-pin/requirements-${VER}.patch"
          fi

      - name: Upload backend pin patch
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: backend-core-pin-${{ env.CORE_PIN_VER }}
          path: /tmp/backend-pin/
          retention-days: 14

      - name: Check backend write token
        id: write_token
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_BACKEND_WRITE }}
        run: |
          GH_TOKEN="$(printf '%s' "${GH_TOKEN:-}" | tr -d '\n\r')"
          export GH_TOKEN
          if [ -z "${GH_TOKEN}" ]; then
            echo "has_write=false" >> "$GITHUB_OUTPUT"
            echo "::warning::GH_PAT_BACKEND_WRITE not set — will skip auto-PR (download artifact instead)"
            exit 0
          fi
          if gh api repos/Treevu-ai/cli-market-backend --jq '.permissions.push' 2>/dev/null | grep -q true; then
            echo "has_write=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_write=false" >> "$GITHUB_OUTPUT"
            echo "::warning::GH_PAT_BACKEND_WRITE cannot push to cli-market-backend — refresh token with Contents: Read and write on that repo"
          fi

      - name: Open PR on cli-market-backend
        if: steps.write_token.outputs.has_write == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_BACKEND_WRITE }}
        working-directory: cli-market-backend
        run: |
          set -euo pipefail
          GH_TOKEN="$(printf '%s' "${GH_TOKEN:-}" | tr -d '\n\r')"
          export GH_TOKEN
          VER="${CORE_PIN_VER}"
          BRANCH="chore/core-pin-${VER}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet requirements.txt; then
            echo "Backend already pinned to cli-market-core>=${VER}"
            exit 0
          fi
          git checkout -b "$BRANCH"
          git add requirements.txt
          git commit -m "chore(deps): pin cli-market-core>=${VER}"
          git push -u origin "$BRANCH"
          gh pr create \
            --repo Treevu-ai/cli-market-backend \
            --base main \
            --head "$BRANCH" \
            --title "chore(deps): pin cli-market-core>=${VER}" \
            --body "Automated from cli-market-world \`sync-backend-core-pin\` workflow after world release ${VER}."

      - name: Manual apply instructions
        if: steps.write_token.outputs.has_write != 'true'
        run: |
          VER="${CORE_PIN_VER}"
          echo "## Backend pin — manual apply required" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "GH_PAT can read backend but not push. Add secret **GH_PAT_BACKEND_WRITE** (fine-grained PAT with Contents write on \`Treevu-ai/cli-market-backend\`), then re-run this workflow." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Or apply locally:" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`bash" >> "$GITHUB_STEP_SUMMARY"
          echo "cd cli-market-backend" >> "$GITHUB_STEP_SUMMARY"
          echo "git checkout -b chore/core-pin-${VER}" >> "$GITHUB_STEP_SUMMARY"
          echo "# requirements.txt line → cli-market-core>=${VER}" >> "$GITHUB_STEP_SUMMARY"
          echo "git commit -am \"chore(deps): pin cli-market-core>=${VER}\"" >> "$GITHUB_STEP_SUMMARY"
          echo "git push -u origin chore/core-pin-${VER}" >> "$GITHUB_STEP_SUMMARY"
          echo "gh pr create --repo Treevu-ai/cli-market-backend --base main --head chore/core-pin-${VER}" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "::error::Set GH_PAT_BACKEND_WRITE or apply patch from workflow artifact backend-core-pin-${VER}"
          exit 1
