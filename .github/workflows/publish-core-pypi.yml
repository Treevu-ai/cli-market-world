# Build cli-market-core from world patch → PyPI.
# Also syncs Treevu-ai/cli-market-core main + tag v{version} when GH_PAT has push.
#
# Manual: Actions → Publish cli-market-core (patch) → Run workflow
# T-173: default 1.9.35 (observatory_snapshot_streak); 1.9.36 = investigate mission.

name: Publish cli-market-core (patch)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Target core version (must match ops/patches/cli-market-core-{version}.patch)"
        required: false
        default: "1.11.0"

permissions:
  contents: read
  id-token: write

jobs:
  publish-core:
    uses: ./.github/workflows/_publish-core-reusable.yml
    # Declared here too (not just inside the reusable workflow's own job):
    # if GH_PAT/PYPI_API_TOKEN are environment-scoped secrets, this caller
    # job needs `environment: pypi` itself to resolve `secrets.GH_PAT`
    # below — otherwise it silently forwards an empty string.
    environment: pypi
    with:
      version: ${{ inputs.version }}
      pr_body: "Automated from cli-market-world publish-core-pypi workflow."
    secrets:
      GH_PAT: ${{ secrets.GH_PAT }}
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
