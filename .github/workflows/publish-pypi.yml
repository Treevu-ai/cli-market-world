name: Publish PyPI

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: pypi
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Checkout cli-market-core
        uses: actions/checkout@v6
        with:
          repository: Treevu-ai/cli-market-core
          ref: ${{ github.ref_type == 'tag' && github.ref_name || 'main' }}
          path: cli-market-core

      - name: Vendor cli-market-core into package
        run: bash ops/vendor_core_for_pypi.sh cli-market-core

      - name: Build cli-market
        run: |
          pip install build
          python -m build

      - name: Publish cli-market to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1