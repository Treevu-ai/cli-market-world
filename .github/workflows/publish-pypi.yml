name: Publish PyPI

on:
  workflow_dispatch:
    inputs:
      mcp_registry_only:
        description: "Skip PyPI upload — only publish to MCP Registry (package must already be on PyPI)"
        type: boolean
        default: false
      version:
        description: "Version override (tag push ignores this; leave blank to use pyproject.toml's version)"
        required: false
        default: ""
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: github.event_name == 'push' || inputs.mcp_registry_only != true
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: pypi
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build deps
        run: |
          pip install build
          pip install "cli-market-core>=1.9.25" \
            || pip install "cli-market-core @ git+https://github.com/Treevu-ai/cli-market-core@a574643"

      - name: Build cli-market-world
        run: python -m build

      - name: Publish cli-market-world to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-mcp-registry:
    needs: publish
    if: |
      always() &&
      (needs.publish.result == 'success' || needs.publish.result == 'skipped') &&
      needs.publish.result != 'failure'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Resolve release version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          elif [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(grep -m1 '^version = ' pyproject.toml | sed -E 's/version = "(.*)"/\1/')
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "MCP registry version: ${VERSION}"

      - name: Sync server.json version
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          jq --arg v "$VERSION" '
            .version = $v |
            .packages[0].version = $v |
            .packages[0].identifier = "cli-market-world"
          ' server.json > server.tmp && mv server.tmp server.json
          cp server.json landing/public/server.json

      - name: Wait for PyPI propagation
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          PKG="cli-market-world"
          echo "Waiting for ${PKG}==${VERSION} on PyPI (MCP registry validates against PyPI)..."
          for i in $(seq 1 36); do
            if curl -fsSL "https://pypi.org/pypi/${PKG}/${VERSION}/json" >/dev/null 2>&1; then
              echo "Found ${PKG} ${VERSION} on PyPI (attempt ${i})"
              exit 0
            fi
            echo "Attempt ${i}/36: not yet available, sleeping 10s..."
            sleep 10
          done
          echo "Timeout: ${PKG} ${VERSION} not visible on PyPI after 6 minutes"
          exit 1

      - name: Install mcp-publisher
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz mcp-publisher

      - name: Validate and publish to MCP Registry
        run: |
          ./mcp-publisher validate
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish

  release-dispersion:
    needs: publish-mcp-registry
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    env:
      GH_PAT: ${{ secrets.GH_PAT }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          elif [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(grep -m1 '^version = ' pyproject.toml | sed -E 's/version = "(.*)"/\1/')
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Dispersion for version: ${VERSION}"

      - name: Install cli-market-world (published version)
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          pip install "cli-market-world==${VERSION}" || pip install "cli-market-world>=${VERSION}"

      - name: Sync landing stats + manifests
        run: python ops/sync_market_stats.py

      - name: Commit dispersion changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          VERSION="${{ steps.ver.outputs.version }}"
          git add landing/ README.md server.json mcp.json docs/ pyproject.toml 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No dispersion changes to commit."
          else
            git commit -m "chore(stats): sync landing and assets after ${VERSION}"
            git push origin HEAD:main
          fi

      - name: Trigger backend core-pin sync
        if: ${{ env.GH_PAT != '' }}
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          curl -fsSL -X POST \
            -H "Authorization: Bearer ${GH_PAT}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/Treevu-ai/cli-market-world/actions/workflows/sync-backend-core-pin.yml/dispatches" \
            -d "{\"ref\":\"main\",\"inputs\":{\"version\":\"${VERSION}\"}}" \
            && echo "Dispatched sync-backend-core-pin for ${VERSION}" \
            || echo "::warning::Could not dispatch sync-backend-core-pin (non-fatal)"
