name: Publish PyPI

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: pypi
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build deps
        run: |
          pip install build
          pip install "cli-market-core>=1.9.25" \
            || pip install "cli-market-core @ git+https://github.com/Treevu-ai/cli-market-core@a574643"

      - name: Build cli-market-world
        run: python -m build

      - name: Publish cli-market-world to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}