name: Pro payment reminder

on:
  schedule:
    # 10:00 America/Lima (PET, UTC-5) = 15:00 UTC — daily
    - cron: "0 15 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  remind:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/checkout@v6
        with:
          repository: Treevu-ai/cli-market-core
          ref: main
          path: .deps/cli-market-core
          token: ${{ secrets.GH_PAT }}

      - name: Install deps
        run: |
          pip install -e ".deps/cli-market-core"
          pip install psycopg2-binary

      - name: Send Pro payment reminders
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          MARKET_SKIP_LIVE: "1"
          CI: "true"
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_USE_TLS: ${{ secrets.SMTP_USE_TLS }}
          BILLING_FROM_EMAIL: ${{ secrets.BILLING_FROM_EMAIL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python3 ops/pro_payment_reminder.py
