name: PAM Nightly

on:
  # Called from morning-ops-chain.yml (08:00 PET) via workflow_call; also
  # runnable standalone via workflow_dispatch for ad-hoc checks.
  workflow_dispatch:
    inputs:
      tier:
        description: Max tier (1 or 2)
        type: choice
        options: ["1", "2"]
        default: "2"
      include_destructive:
        description: Run destructive admin cases (collector trigger, collect smoke, backfill)
        type: boolean
        default: false
  workflow_call:
    inputs:
      tier:
        description: Max tier (1 or 2)
        type: string
        default: "2"
      include_destructive:
        description: Run destructive admin cases (collector trigger, collect smoke, backfill)
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  MARKET_API_URL: https://cli-market-api.fly.dev
  PAM_LANDING_URL: https://cli-market.dev

jobs:
  pam-tier1:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    if: inputs.tier == '1' || inputs.tier == '2'

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: PAM tier 1 (public, landing, user)
        env:
          MARKET_USER_TOKEN: ${{ secrets.MARKET_USER_TOKEN }}
        run: python ops/production_acceptance.py --phase public,landing,user --tier 1

      - uses: actions/checkout@v6
        with:
          repository: Treevu-ai/cli-market-index
          ref: 7a9bd4efa5439a6e041d6e557abaada4a66cfaac
          path: .deps/cli-market-index
          token: ${{ secrets.GH_PAT }}

      - name: PAM tier 1.5 (synthetic journey)
        env:
          MARKET_SKIP_LIVE: "1"
        run: |
          # requirements.txt is the single source of truth for runtime deps
          # (2026-07-19 audit: a hand-picked package list here had already
          # drifted twice — missing twilio and openai, both imported by
          # routers/integrations/whatsapp.py — silently masked until now by
          # continue-on-error on the caller job).
          grep -v '^cli-market-index' requirements.txt > /tmp/pam-requirements.txt
          pip install pytest -r /tmp/pam-requirements.txt
          pip install -e ".deps/cli-market-index[postgres]"
          pip install -e .
          pytest tests/test_funnel.py::test_pam_journey_synthetic -q

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: pam-tier1-${{ github.run_id }}
          path: ops/reports/pam-*.json
          if-no-files-found: ignore

  pam-tier2:
    runs-on: ubuntu-latest
    needs: pam-tier1
    timeout-minutes: 15
    if: inputs.tier == '2'

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: PAM tier 2 (+ admin, post)
        env:
          MARKET_API_TOKEN: ${{ secrets.MARKET_API_TOKEN || vars.MARKET_API_TOKEN }}
          MARKET_USER_TOKEN: ${{ secrets.MARKET_USER_TOKEN }}
        run: |
          ARGS="--phase public,landing,user,admin --tier 2"
          if [ "${{ inputs.include_destructive }}" = "true" ]; then
            ARGS="$ARGS --include-destructive"
          fi
          python ops/production_acceptance.py $ARGS

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: pam-tier2-${{ github.run_id }}
          path: ops/reports/pam-*.json
          if-no-files-found: ignore
