name: Deploy Landing (Cloudflare Pages)

on:
  push:
    branches: [main]
    paths:
      - "landing/**"
      - "cloudflare-pages.json"
      - ".github/workflows/deploy-landing-cloudflare.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: landing/package-lock.json

      - name: Build static export
        working-directory: landing
        run: |
          npm ci
          npm run build

      - name: Require Cloudflare credentials
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CF_TOKEN" ] || [ -z "$CF_ACCOUNT" ]; then
            echo "::error::Missing CLOUDFLARE_API_TOKEN or CLOUDFLARE_ACCOUNT_ID GitHub secrets."
            echo "Create token: Cloudflare Dashboard → My Profile → API Tokens"
            echo "Permissions: Account / Cloudflare Pages / Edit"
            exit 1
          fi

      - name: Deploy to Cloudflare Pages (wrangler)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          command: pages deploy landing/out --project-name=cli-market-world --branch=main