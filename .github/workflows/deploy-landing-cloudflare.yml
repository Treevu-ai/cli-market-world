name: Deploy Landing (Cloudflare Pages)

on:
  push:
    branches: [main]
    paths:
      - "landing/**"
      - "cloudflare-pages.json"
      - ".github/workflows/deploy-landing-cloudflare.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: landing/package-lock.json

      - name: Build static export
        working-directory: landing
        run: |
          npm ci
          npm run build

      - name: Detect Cloudflare credentials
        id: cf_creds
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$CF_TOKEN" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Cloudflare Pages (wrangler)
        if: steps.cf_creds.outputs.present == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy landing/out --project-name=cli-market-world --branch=main

      - name: Skip wrangler (Cloudflare Git integration)
        if: steps.cf_creds.outputs.present != 'true'
        run: echo "No CLOUDFLARE_API_TOKEN — relying on Cloudflare Pages Git build from cloudflare-pages.json"