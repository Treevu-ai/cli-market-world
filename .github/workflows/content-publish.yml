name: Content publish

on:
  workflow_dispatch:
    inputs:
      date:
        description: Publish date (YYYY-MM-DD)
        type: string
        default: "2026-06-12"
  push:
    branches: [main]
    paths:
      - ops/content-publish.trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Resolve publish date
        id: pubdate
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "date=${{ github.event.inputs.date }}" >> "$GITHUB_OUTPUT"
          else
            DATE=$(grep -oE 'publish date=[0-9]{4}-[0-9]{2}-[0-9]{2}' ops/content-publish.trigger | tail -1 | cut -d= -f2)
            echo "date=${DATE:-$(date -u +%F)}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6
        with:
          repository: Treevu-ai/cli-market-content
          ref: main
          path: cli-market-content
          token: ${{ secrets.GH_PAT_CONTENT || secrets.GH_PAT }}

      - name: Verify content checkout
        run: test -d cli-market-content/linkedin

      - name: Mark published (skip broken Makefile)
        working-directory: cli-market-content
        env:
          PUBLISH_DATE: ${{ steps.pubdate.outputs.date }}
        run: |
          set -euo pipefail
          # Never call `make publish` — content Makefile uses $(python3 --version) → breaks CI
          if [ -f scripts/mark-published.py ]; then
            python3 scripts/mark-published.py --date "${PUBLISH_DATE}" \
              || python3 scripts/mark-published.py --day 12
          elif [ -f scripts/publish.py ]; then
            python3 scripts/publish.py --date "${PUBLISH_DATE}"
          else
            echo "::error::scripts/mark-published.py not found in content repo"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git add -A
            git commit -m "chore: mark published ${PUBLISH_DATE}"
            git push
          else
            echo "No content repo changes (already published?)"
          fi

      - name: Show git status
        working-directory: cli-market-content
        run: git status --short && git log -1 --oneline
