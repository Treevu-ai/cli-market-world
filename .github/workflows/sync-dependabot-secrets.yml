# Sync Actions GH_PAT → Dependabot GH_PAT so npm.pkg.github.com auth works.
# Run manually after rotating GH_PAT, or on dependabot.yml changes.

name: Sync Dependabot secrets

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/dependabot.yml
      - .github/workflows/sync-dependabot-secrets.yml

permissions:
  contents: read

jobs:
  sync-gh-pat:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Require Actions GH_PAT
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$GH_PAT" ]; then
            echo "::error::Missing Actions secret GH_PAT — add a PAT with read:packages (and repo if needed)."
            exit 1
          fi

      - name: Copy GH_PAT to Dependabot secrets
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: gh secret set GH_PAT --app dependabot -R "$GITHUB_REPOSITORY" --body "$GH_PAT"

      - name: Done
        run: echo "Dependabot secret GH_PAT updated for npm.pkg.github.com"
