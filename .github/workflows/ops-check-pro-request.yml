name: Ops Check Pro Request

on:
  push:
    branches: [main]
    paths:
      - ops/triggers/check-pro-request.trigger
  workflow_dispatch:
    inputs:
      request_id:
        description: PRO-XXXXXXXX
        required: false
        default: PRO-D2CF329D
      fix_pending:
        description: Mark request activated if tier already pro
        required: false
        default: "true"

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_API_SERVICE_ID: ${{ vars.RAILWAY_API_SERVICE_ID }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - uses: actions/checkout@v6
        with:
          repository: Treevu-ai/cli-market-index
          ref: 9d050131e9e5b16381581d1916e386f34d319ca6
          path: .deps/cli-market-index
          token: ${{ secrets.GH_PAT }}

      - uses: actions/checkout@v6
        with:
          repository: Treevu-ai/cli-market-core
          ref: main
          path: .deps/cli-market-core
          token: ${{ secrets.GH_PAT }}

      - name: Install Python deps
        run: |
          pip install -q -e ".deps/cli-market-core"
          pip install -q -e ".deps/cli-market-index[postgres]"

      - name: Check subscription request
        continue-on-error: true
        run: |
          REQ="${{ github.event.inputs.request_id }}"
          if [ -z "$REQ" ]; then
            REQ=$(grep -E '^request_id=' ops/triggers/check-pro-request.trigger | head -1 | cut -d= -f2-)
          fi
          FIX=""
          FIX_INPUT="${{ github.event.inputs.fix_pending }}"
          if [ "$FIX_INPUT" = "true" ] || grep -q '^fix_pending=true' ops/triggers/check-pro-request.trigger 2>/dev/null; then
            FIX="--fix-pending"
          fi
          pip install -q psycopg2-binary asyncpg
          python3 ops/check_subscription_request.py "$REQ" --username user-69986a5620f9 $FIX

      - name: Force-close request via admin API if still pending
        env:
          MARKET_API_TOKEN: ${{ secrets.MARKET_API_TOKEN }}
        run: |
          REQ="${{ github.event.inputs.request_id }}"
          if [ -z "$REQ" ]; then
            REQ=$(grep -E '^request_id=' ops/triggers/check-pro-request.trigger | head -1 | cut -d= -f2-)
          fi
          if [ -z "$MARKET_API_TOKEN" ]; then
            echo "MARKET_API_TOKEN missing — skip admin close"
            exit 0
          fi
          CODE=$(curl -sS -o /tmp/admin-activate.json -w "%{http_code}" \
            -X POST "${MARKET_API_URL:-https://cli-market-production.up.railway.app}/admin/activate-pro-request" \
            -H "Authorization: Bearer ${MARKET_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"request_id\":\"${REQ}\",\"force\":true}")
          cat /tmp/admin-activate.json
          if [ "$CODE" = "200" ]; then
            echo "Admin closed request ${REQ}"
          elif [ "$CODE" = "404" ]; then
            echo "Admin: request not found or already handled (HTTP 404) — tier may already be pro"
          else
            echo "::warning::admin activate HTTP $CODE"
          fi
