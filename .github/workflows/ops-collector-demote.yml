# One-shot ops: deploy collector + demote erroneous Pro tier.
# Trigger: push to ops/triggers/collector-demote.trigger

name: Ops Collector Deploy and Demote

on:
  push:
    branches: [main]
    paths:
      - ops/triggers/collector-demote.trigger
  workflow_dispatch:
    inputs:
      username:
        description: CLI username to demote to free
        required: false
        default: user-f04c6042d6da

concurrency:
  group: ops-collector-demote
  cancel-in-progress: false

jobs:
  deploy-collector:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_API_SERVICE_ID: ${{ vars.RAILWAY_API_SERVICE_ID }}
      RAILWAY_COLLECTOR_SERVICE_ID: ${{ vars.RAILWAY_COLLECTOR_SERVICE_ID }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate Railway credentials
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: |
          if [ -z "${RAILWAY_API_TOKEN}" ] && [ -z "${RAILWAY_TOKEN}" ]; then
            echo "::error::Missing RAILWAY_TOKEN / RAILWAY_API_TOKEN"
            exit 1
          fi

      - name: Deploy collector
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python3 ops/railway_deploy.py --target collector

  demote-user:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: deploy-collector
    if: always()
    env:
      MARKET_API_URL: https://cli-market-production.up.railway.app
    steps:
      - uses: actions/checkout@v6

      - name: Demote user to free
        env:
          MARKET_API_TOKEN: ${{ secrets.MARKET_API_TOKEN }}
        run: |
          USER="${{ github.event.inputs.username }}"
          if [ -z "$USER" ]; then
            USER=$(grep -E '^username=' ops/triggers/collector-demote.trigger | head -1 | cut -d= -f2-)
          fi
          if [ -z "$USER" ]; then
            echo "::error::No username in trigger file or workflow input"
            exit 1
          fi
          CODE=$(curl -sS -o /tmp/set-tier.json -w "%{http_code}" \
            -X POST "${MARKET_API_URL}/v1/admin/set-tier" \
            -H "Authorization: Bearer ${MARKET_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"${USER}\",\"tier\":\"free\"}")
          cat /tmp/set-tier.json
          if [ "$CODE" != "200" ]; then
            echo "::error::set-tier failed HTTP $CODE"
            exit 1
          fi
          echo "Demoted ${USER} to free"
