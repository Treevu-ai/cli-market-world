name: Verify content PAT

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ops/gtm-ci-run.trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Probe content repo access
        env:
          GH_PAT_CONTENT: ${{ secrets.GH_PAT_CONTENT }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          set -euo pipefail
          if [ -n "${GH_PAT_CONTENT:-}" ]; then
            TOKEN="${GH_PAT_CONTENT}"
            LABEL="GH_PAT_CONTENT"
          elif [ -n "${GH_PAT:-}" ]; then
            TOKEN="${GH_PAT}"
            LABEL="GH_PAT"
          else
            echo "::error::Neither GH_PAT_CONTENT nor GH_PAT is set in repository secrets"
            exit 1
          fi
          CODE=$(curl -sS -o /tmp/content-repo.json -w "%{http_code}" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/Treevu-ai/cli-market-content)
          echo "${LABEL} → HTTP ${CODE}"
          if [ "$CODE" = "200" ]; then
            python3 -c "import json; r=json.load(open('/tmp/content-repo.json')); print('default_branch=', r.get('default_branch'), 'private=', r.get('private'))"
          else
            echo "::error::${LABEL} cannot read Treevu-ai/cli-market-content (HTTP ${CODE})"
            echo "Fine-grained PAT: Repository access must include cli-market-content + Contents: Read and write."
            echo "After updating the PAT on github.com, paste the new token into Settings → Secrets."
            echo "Org SSO: authorize the PAT for Treevu-ai if required."
            exit 1
          fi

      - uses: actions/checkout@v6
        with:
          repository: Treevu-ai/cli-market-content
          ref: main
          path: cli-market-content
          token: ${{ secrets.GH_PAT_CONTENT || secrets.GH_PAT }}

      - name: Verify tree
        run: |
          test -d cli-market-content/linkedin
          echo "checkout OK — $(git -C cli-market-content rev-parse --short HEAD)"
