# Deploy API + collector to Railway from cli-market-world (mirror = prod).
#
# One-time setup:
#   1. Railway → Project → Settings → Tokens → Create project token
#   2. GitHub → Settings → Secrets → RAILWAY_TOKEN = <project token>
#   3. (Opcional) GitHub → Settings → Variables → RAILWAY_API_SERVICE_ID
#      Si no lo pones, el workflow intenta detectar el servicio API automáticamente.
#
# Manual: Actions → Deploy Railway → Run workflow

name: Deploy Railway

on:
  workflow_dispatch:
    inputs:
      target:
        description: "api | collector | both"
        required: false
        default: both
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "Dockerfile.collector"
      - "requirements-railway.txt"
      - "railway.toml"
      - "railway.collector.toml"
      - "*.py"
      - "routers/**"
      - "ops/billing_slack.py"
      - "ops/slack_notify.py"
      - "ops/load_env.py"
      - "ops/command_control_daily.py"
      - ".github/workflows/deploy-railway.yml"

concurrency:
  group: deploy-railway-${{ github.ref }}
  cancel-in-progress: false

env:
  RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
  API_SERVICE_ID: ${{ vars.RAILWAY_API_SERVICE_ID }}
  COLLECTOR_SERVICE_ID: ${{ vars.RAILWAY_COLLECTOR_SERVICE_ID }}
  COLLECTOR_DEFAULT: "3813265a-1862-44a7-a723-62afa8a88dcf"

jobs:
  deploy-api:
    name: Deploy API (cli-market-production)
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_dispatch' && (inputs.target == 'api' || inputs.target == 'both'))
      || (github.event_name == 'push')
    container: ghcr.io/railwayapp/cli:5.2.0
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Validate Railway token
        run: |
          if [ -z "${RAILWAY_TOKEN}" ]; then
            echo "::error::Missing secret RAILWAY_TOKEN. Railway → Project → Settings → Tokens → GitHub Secrets."
            exit 1
          fi

      - name: Resolve API service ID
        id: resolve
        run: |
          if [ -n "${API_SERVICE_ID}" ]; then
            echo "Using RAILWAY_API_SERVICE_ID from GitHub Variables"
            echo "service_id=${API_SERVICE_ID}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Auto-detecting API service (set RAILWAY_API_SERVICE_ID to skip)..."
          railway service list --json > /tmp/services.json
          SERVICE_ID=$(python3 <<'PY'
          import json
          import os
          import sys

          collector = os.environ.get("COLLECTOR_DEFAULT", "")
          skip_names = ("postgres", "redis", "database", "db", "collector")
          raw = json.load(open("/tmp/services.json"))
          items = raw if isinstance(raw, list) else raw.get("services") or raw.get("data") or []
          candidates: list[tuple[str, str]] = []
          for s in items:
              sid = (s.get("id") or s.get("serviceId") or "").strip()
              name = (s.get("name") or "").strip()
              lname = name.lower()
              if not sid or sid == collector:
                  continue
              if any(x in lname for x in skip_names):
                  continue
              candidates.append((lname, sid))
          prefs = ("cli-market-production", "production", "api", "world", "backend", "web")
          for pref in prefs:
              for lname, sid in candidates:
                  if pref in lname:
                      print(sid)
                      sys.exit(0)
          if len(candidates) == 1:
              print(candidates[0][1])
          elif candidates:
              print(sorted(candidates)[0][1])
          PY
          )
          if [ -z "${SERVICE_ID}" ]; then
            echo "::error::Could not auto-detect API service. Set GitHub variable RAILWAY_API_SERVICE_ID (see ops/RAILWAY_DEPLOY.md)."
            cat /tmp/services.json
            exit 1
          fi
          echo "Resolved API service_id=${SERVICE_ID}"
          echo "service_id=${SERVICE_ID}" >> "$GITHUB_OUTPUT"

      - name: railway up (API)
        run: railway up --service="${{ steps.resolve.outputs.service_id }}" --detach

  deploy-collector:
    name: Deploy collector
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' && (inputs.target == 'collector' || inputs.target == 'both')
    container: ghcr.io/railwayapp/cli:5.2.0
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Validate Railway token
        run: |
          if [ -z "${RAILWAY_TOKEN}" ]; then
            echo "::error::Missing secret RAILWAY_TOKEN."
            exit 1
          fi

      - name: railway up (collector)
        run: |
          SVC="${COLLECTOR_SERVICE_ID:-$COLLECTOR_DEFAULT}"
          echo "Deploying collector service_id=${SVC}"
          railway up --service="${SVC}" --detach

  verify-api:
    name: Verify prod version
    needs: deploy-api
    runs-on: ubuntu-latest
    if: always() && needs.deploy-api.result == 'success'
    steps:
      - name: Wait for health
        run: |
          API="https://cli-market-production.up.railway.app"
          for i in $(seq 1 24); do
            code=$(curl -sS -o /tmp/health.json -w "%{http_code}" "$API/health" || echo 000)
            if [ "$code" = "200" ]; then
              echo "Health OK after ${i} attempts"
              cat /tmp/health.json
              exit 0
            fi
            echo "Attempt $i: HTTP $code — waiting 15s"
            sleep 15
          done
          echo "::error::API /health did not return 200 after 6 minutes"
          exit 1

      - name: Check OpenAPI version
        run: |
          ver=$(curl -sS https://cli-market-production.up.railway.app/openapi.json | python3 -c "import sys,json; print(json.load(sys.stdin)['info']['version'])")
          echo "Prod OpenAPI version: $ver"
          if [ "$ver" = "1.9.30" ]; then
            echo "::warning::Still on 1.9.30 — confirm deploy finished or service ID is correct"
          fi
