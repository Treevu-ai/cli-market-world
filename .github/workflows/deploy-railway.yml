# Deploy API + collector on Railway (trigger latest GitHub commit on connected services).
#
# Setup (once):
#   1. https://railway.com/account/tokens → Create token (Team → No team)
#   2. GitHub repo → Settings → Secrets → Actions → RAILWAY_API_TOKEN
#      (Project tokens from Railway project settings are read-only — they will NOT deploy.)
#   3. Optional: Cursor Cloud → Secrets → RAILWAY_API_TOKEN (for agent CLI deploy)
#
# Manual: Actions → Deploy Railway → Run workflow

name: Deploy Railway

on:
  workflow_dispatch:
    inputs:
      target:
        description: "api | collector | both"
        required: false
        default: both
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "Dockerfile.collector"
      - "requirements-railway.txt"
      - "railway.toml"
      - "railway.collector.toml"
      - "*.py"
      - "routers/**"
      - "ops/railway_deploy.py"
      - "ops/billing_slack.py"
      - "ops/slack_notify.py"
      - "ops/load_env.py"
      - "ops/command_control_daily.py"
      - ".github/workflows/deploy-railway.yml"

concurrency:
  group: deploy-railway-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Railway (${{ github.event_name == 'workflow_dispatch' && inputs.target || 'api' }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN || secrets.RAILWAY_TOKEN || vars.RAILWAY_API_TOKEN || vars.RAILWAY_TOKEN }}
      RAILWAY_API_SERVICE_ID: ${{ vars.RAILWAY_API_SERVICE_ID }}
      RAILWAY_COLLECTOR_SERVICE_ID: ${{ vars.RAILWAY_COLLECTOR_SERVICE_ID }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate Railway token
        run: |
          if [ -z "${RAILWAY_API_TOKEN}" ]; then
            echo "::error::Missing RAILWAY_API_TOKEN. Use an ACCOUNT token from https://railway.com/account/tokens (not the read-only project token). Add as GitHub Actions secret RAILWAY_API_TOKEN."
            exit 1
          fi
          echo "Railway token present (length ${#RAILWAY_API_TOKEN})"

      - name: List Railway services
        run: python3 ops/railway_deploy.py --list-services

      - name: Trigger Railway deploy
        run: |
          TARGET="${{ github.event_name == 'workflow_dispatch' && inputs.target || 'api' }}"
          python3 ops/railway_deploy.py --target "$TARGET"

  verify-api:
    name: Verify prod version
    needs: deploy
    runs-on: ubuntu-latest
    if: always() && needs.deploy.result == 'success'
    steps:
      - name: Wait for health
        run: |
          API="https://cli-market-production.up.railway.app"
          for i in $(seq 1 30); do
            code=$(curl -sS -o /tmp/health.json -w "%{http_code}" "$API/health" || echo 000)
            if [ "$code" = "200" ]; then
              echo "Health OK after ${i} attempts"
              cat /tmp/health.json
              exit 0
            fi
            echo "Attempt $i: HTTP $code — waiting 20s"
            sleep 20
          done
          echo "::error::API /health did not return 200 after 10 minutes"
          exit 1

      - name: Check OpenAPI version
        run: |
          ver=$(curl -sS https://cli-market-production.up.railway.app/openapi.json | python3 -c "import sys,json; print(json.load(sys.stdin)['info']['version'])")
          echo "Prod OpenAPI version: $ver"
          curl -sS "https://cli-market-production.up.railway.app/analytics/observatory?days=30" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          tools=[t['name'] for t in d.get('top_tools',[])]
          print('index_stats in top_tools:', 'index_stats' in tools)
          "
          if [ "$ver" = "1.9.30" ]; then
            echo "::warning::Still on 1.9.30 after deploy — confirm Railway service is linked to this GitHub repo/branch"
          fi
