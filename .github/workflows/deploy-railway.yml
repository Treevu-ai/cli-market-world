# Deploy API + collector on Railway.
#
# Tokens (pick one or both — GitHub → Settings → Secrets → Actions):
#   RAILWAY_API_TOKEN — account token → GraphQL deploy latest GitHub commit
#     https://railway.com/account/tokens (Team → No team)
#   RAILWAY_TOKEN — project token → `railway up` uploads this checkout (no account token needed)
#     Railway project → Settings → Tokens → Create
#
# Manual: Actions → Deploy Railway → Run workflow

name: Deploy Railway

on:
  workflow_dispatch:
    inputs:
      target:
        description: "api | collector | both"
        required: false
        default: both
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "Dockerfile.collector"
      - "requirements-railway.txt"
      - "railway.toml"
      - "railway.collector.toml"
      - "*.py"
      - "routers/**"
      - "ops/railway_deploy.py"
      - "ops/billing_slack.py"
      - "ops/slack_notify.py"
      - "ops/load_env.py"
      - "ops/command_control_daily.py"
      - ".github/workflows/deploy-railway.yml"

concurrency:
  group: deploy-railway-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Railway (${{ github.event_name == 'workflow_dispatch' && inputs.target || 'api' }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      # Do not set empty RAILWAY_API_TOKEN — Railway CLI errors if both token env vars exist.
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_API_SERVICE_ID: ${{ vars.RAILWAY_API_SERVICE_ID }}
      RAILWAY_COLLECTOR_SERVICE_ID: ${{ vars.RAILWAY_COLLECTOR_SERVICE_ID }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate Railway credentials
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: |
          if [ -z "${RAILWAY_API_TOKEN}" ] && [ -z "${RAILWAY_TOKEN}" ]; then
            echo "::error::Missing Railway credentials. Add GitHub secret RAILWAY_TOKEN (project token). See ops/RAILWAY_DEPLOY.md"
            exit 1
          fi
          if [ -n "${RAILWAY_API_TOKEN}" ]; then
            echo "RAILWAY_API_TOKEN present (length ${#RAILWAY_API_TOKEN})"
            export RAILWAY_API_TOKEN
          fi
          if [ -n "${RAILWAY_TOKEN}" ]; then
            echo "RAILWAY_TOKEN present (length ${#RAILWAY_TOKEN})"
          fi

      - name: List Railway services
        run: python3 ops/railway_deploy.py --list-services
        continue-on-error: true

      - name: Trigger Railway deploy
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          TARGET="${{ github.event_name == 'workflow_dispatch' && inputs.target || 'api' }}"
          python3 ops/railway_deploy.py --target "$TARGET"

  verify-api:
    name: Verify prod version
    needs: deploy
    runs-on: ubuntu-latest
    if: always() && needs.deploy.result == 'success'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Wait and verify production
        run: |
          python3 ops/railway_prod_status.py --wait \
            --observatory-p0 \
            --min-version-from-pyproject
