name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  MARKET_DATA_DIR: /tmp/market-test-data
  DATABASE_URL: ""
  MARKET_SKIP_LIVE: "1"

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Lint
        run: pip install ruff && ruff check .

      - name: Verify public copy (no stale 27-MCP / 61k references)
        run: python3 ops/verify_public_copy.py

  test:
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 10
    env:
      CI: "true"
      GITHUB_ACTIONS: "true"

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/checkout@v6
        with:
          repository: Treevu-ai/cli-market-index
          ref: 9d050131e9e5b16381581d1916e386f34d319ca6
          path: .deps/cli-market-index
          token: ${{ secrets.GH_PAT }}

      - name: Probe GH_PAT backend read access
        id: probe-backend
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python ops/probe_gh_pat_backend.py

      - name: Checkout backend (required when GH_PAT has read)
        id: checkout-backend
        continue-on-error: ${{ steps.probe-backend.outputs.ok != 'true' }}
        uses: actions/checkout@v6
        with:
          repository: Treevu-ai/cli-market-backend
          ref: main
          path: .deps/cli-market-backend
          token: ${{ secrets.GH_PAT }}

      - name: Fail when backend checkout required but failed
        if: steps.probe-backend.outputs.ok == 'true' && steps.checkout-backend.outcome != 'success'
        run: |
          echo "::error::GH_PAT can read cli-market-backend but checkout failed — fix GH_PAT or repo access"
          exit 1

      - name: Install dependencies
        run: |
          pip install "cli-market-core==1.11.10"
          pip install -e ".deps/cli-market-index[postgres]"
          pip install pytest
          python -c "from market_core.commerce_capabilities import get_commerce_capabilities; assert get_commerce_capabilities()['checkout']['scope'] == 'cli_market_internal'"

      - name: Contract parity (OpenAPI + core pin + Observatory mirror)
        if: steps.probe-backend.outputs.ok == 'true' && steps.checkout-backend.outcome == 'success'
        run: python ops/contract_parity.py --backend-path .deps/cli-market-backend

      - name: Contract parity skipped (GH_PAT cannot read backend)
        if: steps.probe-backend.outputs.ok != 'true'
        run: |
          echo "::warning::GH_PAT cannot read Treevu-ai/cli-market-backend — contract parity skipped. Add Contents: Read on backend repo to the fine-grained PAT in cli-market-world secrets."

      - name: Verify phase docs / required tests
        run: python ops/verify_phase_docs.py --audit-docs

      - name: Run tests
        run: pytest tests/test_checkout_payments.py tests/ -q -m "not integration"

  test-pg:
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 10
    env:
      CI: "true"
      GITHUB_ACTIONS: "true"
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres"
      MARKET_SKIP_LIVE: "1"
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/checkout@v6
        with:
          repository: Treevu-ai/cli-market-index
          ref: 9d050131e9e5b16381581d1916e386f34d319ca6
          path: .deps/cli-market-index
          token: ${{ secrets.GH_PAT }}

      - name: Probe GH_PAT backend read access
        id: probe-backend
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python ops/probe_gh_pat_backend.py

      - name: Checkout backend (required when GH_PAT has read)
        id: checkout-backend
        continue-on-error: ${{ steps.probe-backend.outputs.ok != 'true' }}
        uses: actions/checkout@v6
        with:
          repository: Treevu-ai/cli-market-backend
          ref: main
          path: .deps/cli-market-backend
          token: ${{ secrets.GH_PAT }}

      - name: Fail when backend checkout required but failed
        if: steps.probe-backend.outputs.ok == 'true' && steps.checkout-backend.outcome != 'success'
        run: |
          echo "::error::GH_PAT can read cli-market-backend but checkout failed — fix GH_PAT or repo access"
          exit 1

      - name: Install dependencies
        run: |
          pip install "cli-market-core==1.11.10"
          pip install -e ".deps/cli-market-index[postgres]"
          pip install pytest
          python -c "from market_core.commerce_capabilities import get_commerce_capabilities; assert get_commerce_capabilities()['checkout']['scope'] == 'cli_market_internal'"

      - name: Contract parity (OpenAPI + core pin + Observatory mirror)
        if: steps.probe-backend.outputs.ok == 'true' && steps.checkout-backend.outcome == 'success'
        run: python ops/contract_parity.py --backend-path .deps/cli-market-backend

      - name: Contract parity skipped (GH_PAT cannot read backend)
        if: steps.probe-backend.outputs.ok != 'true'
        run: |
          echo "::warning::GH_PAT cannot read Treevu-ai/cli-market-backend — contract parity skipped. Add Contents: Read on backend repo to the fine-grained PAT in cli-market-world secrets."

      - name: Verify phase docs / required tests
        run: python ops/verify_phase_docs.py --audit-docs

      - name: Run tests against PostgreSQL
        run: pytest tests/test_checkout_payments.py tests/ -q -m "not integration"

  smoke-production:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 8
    
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install smoke dependencies
        run: pip install httpx

      - name: Production smoke
        run: bash ops/smoke_e2e.sh

      - name: Doctor prod gate
        run: python3 ops/doctor_prod_gate.py

      - name: Collector health gate
        run: |
          python3 - <<'PY'
          import httpx
          r = httpx.get("https://cli-market-production.up.railway.app/dashboard/data", timeout=45)
          r.raise_for_status()
          data = r.json()
          k = data.get("kpis", {})
          moat = data.get("moat_summary", {})
          pct = float(k.get("store_success_pct") or 0)
          healthy = int(k.get("healthy_stores") or 0)
          total = int(k.get("total_stores") or 1)
          indexed = int(k.get("total_indexed") or k.get("total_snapshots") or 0)
          critical = sum(
              1 for h in data.get("store_health", [])
              if float(h.get("success_pct") or 0) < 30
          )
          print(f"Store health: {healthy}/{total} ({pct}%) · indexados: {indexed:,} · críticas: {critical}")
          if moat.get("collector_stale"):
              raise SystemExit("collector_stale=true — moat data is stale")
          if indexed < 1000:
              raise SystemExit(f"total_indexed too low: {indexed}")
          PY
