name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  MARKET_DATA_DIR: /tmp/market-test-data
  DATABASE_URL: ""
  MARKET_SKIP_LIVE: "1"

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Lint
        run: pip install ruff && ruff check .

  test:
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 10
    env:
      CI: "true"
      GITHUB_ACTIONS: "true"

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest httpx

      - name: Run tests
        # Unit tests only on PR/push; live API + latency live on main (smoke-production).
        run: pytest tests/ -q -m "not integration"

  smoke-production:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: test
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install smoke dependencies
        run: pip install httpx

      - name: Production smoke
        run: bash ops/smoke_e2e.sh

      - name: Collector health gate
        run: |
          python3 - <<'PY'
          import httpx
          r = httpx.get("https://cli-market-production.up.railway.app/dashboard/data", timeout=30)
          r.raise_for_status()
          k = r.json().get("kpis", {})
          pct = float(k.get("store_success_pct") or 0)
          healthy = int(k.get("healthy_stores") or 0)
          total = int(k.get("total_stores") or 1)
          print(f"Store health: {healthy}/{total} ({pct}%)")
          PY
