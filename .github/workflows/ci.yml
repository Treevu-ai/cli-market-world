name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  MARKET_DATA_DIR: /tmp/market-test-data
  DATABASE_URL: ""
  MARKET_SKIP_LIVE: "1"

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Lint
        run: pip install ruff && ruff check .

  test:
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 10
    env:
      CI: "true"
      GITHUB_ACTIONS: "true"

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Extract pinned cli-market-core ref
        id: core
        run: |
          REF=$(python -c "import re, pathlib; t=pathlib.Path('requirements-railway.txt').read_text(); m=re.search(r'cli-market-core@([a-f0-9]{40})', t); assert m, 'pin missing'; print(m.group(1))")
          echo "ref=$REF" >> "$GITHUB_OUTPUT"

      - name: Checkout cli-market-core
        uses: actions/checkout@v6
        with:
          repository: Treevu-ai/cli-market-core
          ref: ${{ steps.core.outputs.ref }}
          path: cli-market-core
          token: ${{ secrets.GH_PAT }}

      - name: Vendor cli-market-core for tests
        run: bash ops/vendor_core_for_pypi.sh cli-market-core

      - name: Install dependencies
        run: |
          pip install --no-cache-dir ./cli-market-core
          pip install pytest
          python -c "import inspect; from market_core.market_billing import db_create_subscription_request as f; assert 'prefix' in inspect.signature(f).parameters"

      - name: Run tests
        run: pytest tests/ -q -m "not integration"

  test-pg:
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 10
    env:
      CI: "true"
      GITHUB_ACTIONS: "true"
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres"
      MARKET_SKIP_LIVE: "1"
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Extract pinned cli-market-core ref
        id: core
        run: |
          REF=$(python -c "import re, pathlib; t=pathlib.Path('requirements-railway.txt').read_text(); m=re.search(r'cli-market-core@([a-f0-9]{40})', t); assert m, 'pin missing'; print(m.group(1))")
          echo "ref=$REF" >> "$GITHUB_OUTPUT"

      - name: Checkout cli-market-core
        uses: actions/checkout@v6
        with:
          repository: Treevu-ai/cli-market-core
          ref: ${{ steps.core.outputs.ref }}
          path: cli-market-core
          token: ${{ secrets.GH_PAT }}

      - name: Vendor cli-market-core for tests
        run: bash ops/vendor_core_for_pypi.sh cli-market-core

      - name: Install dependencies
        run: |
          pip install --no-cache-dir ./cli-market-core
          pip install pytest
          python -c "import inspect; from market_core.market_billing import db_create_subscription_request as f; assert 'prefix' in inspect.signature(f).parameters"

      - name: Run tests against PostgreSQL
        run: pytest tests/ -q -m "not integration"

  smoke-production:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 8
    
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install smoke dependencies
        run: pip install httpx

      - name: Production smoke
        run: bash ops/smoke_e2e.sh

      - name: Collector health gate
        run: |
          python3 - <<'PY'
          import httpx
          r = httpx.get("https://cli-market-production.up.railway.app/dashboard/data", timeout=45)
          r.raise_for_status()
          data = r.json()
          k = data.get("kpis", {})
          moat = data.get("moat_summary", {})
          pct = float(k.get("store_success_pct") or 0)
          healthy = int(k.get("healthy_stores") or 0)
          total = int(k.get("total_stores") or 1)
          indexed = int(k.get("total_indexed") or k.get("total_snapshots") or 0)
          critical = sum(
              1 for h in data.get("store_health", [])
              if float(h.get("success_pct") or 0) < 30
          )
          print(f"Store health: {healthy}/{total} ({pct}%) · indexados: {indexed:,} · críticas: {critical}")
          if moat.get("collector_stale"):
              raise SystemExit("collector_stale=true — moat data is stale")
          if indexed < 1000:
              raise SystemExit(f"total_indexed too low: {indexed}")
          PY
