name: Sync backend CI (index checkout + pytest.ini)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ops/backend-parity/**
      - ops/sync_backend_ci.sh
      - ops/backend-ci.trigger

permissions:
  contents: read

jobs:
  sync-backend-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/checkout@v6
        with:
          repository: Treevu-ai/cli-market-backend
          ref: main
          path: cli-market-backend
          token: ${{ secrets.GH_PAT }}

      - name: Copy CI parity files world → backend
        env:
          BACKEND_DIR: ${{ github.workspace }}/cli-market-backend
        run: |
          chmod +x ops/sync_backend_ci.sh
          ./ops/sync_backend_ci.sh

      - name: Save patch artifact (always)
        if: always()
        run: |
          mkdir -p /tmp/backend-ci
          git -C cli-market-backend add -N pytest.ini ruff.toml .github/workflows/ci.yml 2>/dev/null || true
          git -C cli-market-backend diff HEAD > /tmp/backend-ci/backend-ci.patch || true
          if [ ! -s /tmp/backend-ci/backend-ci.patch ]; then
            echo "No diff — backend CI already matches world template" > /tmp/backend-ci/backend-ci.patch
          fi

      - name: Upload backend CI patch
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: backend-ci-parity
          path: /tmp/backend-ci/
          retention-days: 14

      - name: Check backend write token
        id: write_token
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_BACKEND_WRITE }}
        run: |
          GH_TOKEN="$(printf '%s' "${GH_TOKEN:-}" | tr -d '\n\r')"
          export GH_TOKEN
          if [ -z "${GH_TOKEN}" ]; then
            echo "has_write=false" >> "$GITHUB_OUTPUT"
            echo "::warning::GH_PAT_BACKEND_WRITE not set — will skip auto-PR"
            exit 0
          fi
          if gh api repos/Treevu-ai/cli-market-backend --jq '.permissions.push' 2>/dev/null | grep -q true; then
            echo "has_write=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_write=false" >> "$GITHUB_OUTPUT"
            echo "::warning::GH_PAT_BACKEND_WRITE cannot push to cli-market-backend"
          fi

      - name: Open PR on cli-market-backend
        if: steps.write_token.outputs.has_write == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_BACKEND_WRITE }}
          PARITY_DIR: ${{ github.workspace }}/ops/backend-parity
        working-directory: cli-market-backend
        run: |
          set -euo pipefail
          GH_TOKEN="$(printf '%s' "${GH_TOKEN:-}" | tr -d '\n\r')"
          export GH_TOKEN
          BRANCH="chore/ci-yml-index-$(date -u +%Y%m%d)"
          CI_YML_BLOCKED=false
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin
          git reset --hard origin/main
          git clean -fd
          cp "$PARITY_DIR/pytest.ini" pytest.ini
          cp "$PARITY_DIR/ruff.toml" ruff.toml
          mkdir -p .github/workflows
          cp "$PARITY_DIR/ci.yml" .github/workflows/ci.yml
          if git diff --quiet pytest.ini ruff.toml .github/workflows/ci.yml; then
            echo "Backend main already matches world CI template"
            exit 0
          fi
          git checkout -b "$BRANCH"
          git add pytest.ini ruff.toml .github/workflows/ci.yml
          git commit -m "fix(ci): ruff parity + cli-market-index checkout + pytest integration mark"
          if ! git push -u origin "$BRANCH" 2>&1 | tee /tmp/backend-ci-push.log; then
            if grep -qi workflow /tmp/backend-ci-push.log; then
              echo "::warning::Push rejected — re-paste GH_PAT_BACKEND_WRITE after adding Workflows: Read and write"
              CI_YML_BLOCKED=true
            else
              cat /tmp/backend-ci-push.log
              exit 1
            fi
          fi
          if [ "$CI_YML_BLOCKED" != true ]; then
            PR_BODY="Automated from cli-market-world sync-backend-ci. Adds ruff.toml (fixes lint E402 on market_server.py), cli-market-index checkout, pytest.ini integration mark."
            PR_URL="$(gh pr list --repo Treevu-ai/cli-market-backend --state open --head "Treevu-ai:${BRANCH}" --json url --jq '.[0].url' 2>/dev/null || true)"
            if [ -n "$PR_URL" ] && [ "$PR_URL" != "null" ]; then
              echo "$PR_URL"
            else
              gh pr create \
                --repo Treevu-ai/cli-market-backend \
                --base main \
                --head "$BRANCH" \
                --title "fix(ci): ruff parity + cli-market-index checkout for tests" \
                --body "$PR_BODY" 2>&1 | tee /tmp/backend-ci-pr.log || {
                if grep -qi 'already exists' /tmp/backend-ci-pr.log; then
                  gh pr list --repo Treevu-ai/cli-market-backend --state open --head "Treevu-ai:${BRANCH}" --json url --jq '.[0].url'
                else
                  cat /tmp/backend-ci-pr.log
                  exit 1
                fi
              }
            fi
          fi
          if [ "$CI_YML_BLOCKED" = true ]; then
            echo "## Backend CI — ci.yml blocked by PAT scope" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "1. Fine-grained PAT \`cli-market-world-backend-write\` → **Workflows: Read and write** on \`cli-market-backend\`" >> "$GITHUB_STEP_SUMMARY"
            echo "2. **Re-paste** token in secret \`GH_PAT_BACKEND_WRITE\` (editar permisos no actualiza el secret)" >> "$GITHUB_STEP_SUMMARY"
            echo "3. Bump \`ops/backend-ci.trigger\` → re-run this workflow" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Mientras tanto: artifact **backend-ci-parity** tiene el patch de \`.github/workflows/ci.yml\`." >> "$GITHUB_STEP_SUMMARY"
            echo "::warning::ci.yml not pushed — GH_PAT_BACKEND_WRITE still missing Workflows scope or secret not re-pasted"
            exit 0
          fi

      - name: Detect backend diff
        id: diff
        run: |
          if git -C cli-market-backend diff --quiet; then
            echo "has_diff=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_diff=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Manual apply instructions
        if: steps.write_token.outputs.has_write != 'true' && steps.diff.outputs.has_diff == 'true'
        run: |
          echo "## Backend CI — manual apply required" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Download artifact **backend-ci-parity** or run locally:" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`bash" >> "$GITHUB_STEP_SUMMARY"
          echo "BACKEND_DIR=../cli-market-backend ./ops/sync_backend_ci.sh" >> "$GITHUB_STEP_SUMMARY"
          echo "cd cli-market-backend && git checkout -b chore/ci-index-checkout && git commit -am 'fix(ci): index checkout + pytest.ini'" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "::warning::Set GH_PAT_BACKEND_WRITE or apply patch from artifact backend-ci-parity"
