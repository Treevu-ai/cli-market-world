# cli-market-core PyPI publish via commit — no workflow_dispatch needed.
# Edit ops/core-publish.trigger and push to main.

name: Publish cli-market-core (trigger)

on:
  push:
    branches: [main]
    paths:
      - "ops/core-publish.trigger"

permissions:
  contents: read
  id-token: write

jobs:
  read-version:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Read version from trigger file
        id: ver
        run: |
          VERSION="$(grep -E '^VERSION=' ops/core-publish.trigger | head -1 | cut -d= -f2- | tr -d ' \r')"
          test -n "$VERSION"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Publishing cli-market-core ${VERSION}"

  publish-core:
    needs: read-version
    uses: ./.github/workflows/_publish-core-reusable.yml
    # Declared here too (not just inside the reusable workflow's own job):
    # if GH_PAT/PYPI_API_TOKEN are environment-scoped secrets, this caller
    # job needs `environment: pypi` itself to resolve `secrets.GH_PAT`
    # below — otherwise it silently forwards an empty string.
    environment: pypi
    with:
      version: ${{ needs.read-version.outputs.version }}
      pr_body: "Automated from cli-market-world core-pypi-trigger workflow."
    secrets:
      GH_PAT: ${{ secrets.GH_PAT }}
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
