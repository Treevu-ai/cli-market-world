name: Monday Ops Playbook

on:
  schedule:
    - cron: "0 13 * * 1"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ops:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install httpx

      - name: Run Monday report and Price Pulse
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python3 ops/monday.py

      - name: Upload reports
        uses: actions/upload-artifact@v6
        with:
          name: ops-report
          path: |
            ops/reports/
            docs/metrics/
