name: Monday Ops Playbook

on:
  schedule:
    - cron: "0 13 * * 1"  # 13:00 UTC = 08:00 Lima every Monday
  workflow_dispatch:       # manual trigger from GitHub UI

jobs:
  ops:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install httpx

      - name: Run Monday report
        run: python3 ops/monday.py --dry-run

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: ops-report
          path: ops/reports/
