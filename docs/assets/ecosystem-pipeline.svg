<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 620" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="g4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#059669;stop-opacity:0.05"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <text x="360" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">CLI Market — Ecosystem Pipeline</text>

  <!-- LAYER 1 -->
  <rect x="40" y="60" width="640" height="110" rx="10" fill="url(#g1)" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="40" y="60" width="6" height="110" rx="3" fill="#2563eb"/>
  <text x="65" y="88" font-size="14" font-weight="700" fill="#1e40af">cli-market-backend</text>
  <text x="65" y="106" font-size="11" fill="#64748b">Data Ingestion — Scrapers + FastAPI Server</text>
  <text x="65" y="126" font-size="10" fill="#475569">66 retailers VTEX · 8 countries · Playwright fallback · 4h refresh cycle</text>
  <text x="65" y="144" font-size="10" fill="#475569">collect_prices.py → 45,000+ shelf prices → PostgreSQL</text>

  <!-- Arrow 1 -->
  <polygon points="360,175 355,170 365,170" fill="#94a3b8"/>
  <line x1="360" y1="170" x2="360" y2="190" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="370" y="183" font-size="9" fill="#94a3b8">raw snapshots</text>

  <!-- LAYER 2 -->
  <rect x="40" y="195" width="640" height="110" rx="10" fill="url(#g2)" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="40" y="195" width="6" height="110" rx="3" fill="#7c3aed"/>
  <text x="65" y="223" font-size="14" font-weight="700" fill="#6b21a8">cli-market-index</text>
  <text x="65" y="241" font-size="11" fill="#64748b">Semantic Refinery — Entity Resolution + Golden Records</text>
  <text x="65" y="261" font-size="10" fill="#475569">unit_normalizer · brand_normalizer · Entity Resolver (exact + fuzzy + drift)</text>
  <text x="65" y="279" font-size="10" fill="#475569">Raw name → prod_ ID · 98% confidence on exact match · immutable identity</text>

  <!-- Arrow 2 -->
  <polygon points="360,310 355,305 365,305" fill="#94a3b8"/>
  <line x1="360" y1="305" x2="360" y2="325" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="370" y="318" font-size="9" fill="#94a3b8">canonical identities</text>

  <!-- LAYER 3 -->
  <rect x="40" y="330" width="640" height="110" rx="10" fill="url(#g3)" stroke="#dc2626" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="40" y="330" width="6" height="110" rx="3" fill="#dc2626"/>
  <text x="65" y="358" font-size="14" font-weight="700" fill="#991b1b">cli-market-core</text>
  <text x="65" y="376" font-size="11" fill="#64748b">Intelligence — Indicators, Billing, Connectors, MCP Tools</text>
  <text x="65" y="396" font-size="10" fill="#475569">34 market indicators · P25/P50/P75 spreads · PayPal/SUNAT billing</text>
  <text x="65" y="414" font-size="10" fill="#475569">43 MCP tools · enrichment (OFF, IMF, World Bank) · v1.8.0</text>

  <!-- Arrow 3 -->
  <polygon points="360,445 355,440 365,440" fill="#94a3b8"/>
  <line x1="360" y1="440" x2="360" y2="460" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="370" y="453" font-size="9" fill="#94a3b8">structured intelligence</text>

  <!-- LAYER 4 -->
  <rect x="40" y="465" width="640" height="110" rx="10" fill="url(#g4)" stroke="#059669" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="40" y="465" width="6" height="110" rx="3" fill="#059669"/>
  <text x="65" y="493" font-size="14" font-weight="700" fill="#065f46">cli-market-world</text>
  <text x="65" y="511" font-size="11" fill="#64748b">Exposure — Landing, Docs, MCP Registry, Deployment</text>
  <text x="65" y="531" font-size="10" fill="#475569">Next.js landing · server-card.json · smithery.yaml · Railway configs</text>
  <text x="65" y="549" font-size="10" fill="#475569">Agent contexts · legal docs · dashboard · Cloudflare Pages</text>

  <!-- Consumers -->
  <text x="360" y="608" text-anchor="middle" font-size="11" font-weight="600" fill="#64748b">CONSUMERS</text>
  <rect x="130" y="618" width="100" height="22" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="180" y="634" text-anchor="middle" font-size="9" fill="#475569">AI Agents (MCP)</text>
  <rect x="250" y="618" width="100" height="22" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="300" y="634" text-anchor="middle" font-size="9" fill="#475569">REST API</text>
  <rect x="370" y="618" width="100" height="22" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="420" y="634" text-anchor="middle" font-size="9" fill="#475569">market CLI</text>
  <rect x="490" y="618" width="100" height="22" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="540" y="634" text-anchor="middle" font-size="9" fill="#475569">Web Dashboard</text>
</svg>
