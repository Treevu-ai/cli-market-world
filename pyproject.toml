[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "cli-market"
version = "1.0.0"
description = "CLI Market — 3,600+ retailers VTEX, 67 países, 12 líneas. Infraestructura de comercio para agentes de IA."
requires-python = ">=3.10"
dependencies = [
    "httpx>=0.27",
    "rich>=13.0",
    "fastapi>=0.115",
    "uvicorn>=0.30",
    "pydantic>=2.0",
]

[project.scripts]
market = "market_cli:main"
market-server = "market_server:main"
wongcli = "wongcli:main"

[tool.setuptools]
py-modules = ["market_cli", "market_server", "market_mcp", "wongcli"]
