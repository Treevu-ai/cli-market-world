[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "cli-market"
version = "1.1.0"
description = "CLI Market — 27 verified VTEX retailers across 8 countries, 4 lines. Commerce infrastructure for AI agents."
requires-python = ">=3.10"
license = "MIT"
authors = [{name = "CLI Market", email = "hello@cli-market.dev"}]
keywords = ["vtex", "mcp", "ai-agents", "ecommerce", "cli", "retail", "commerce", "infrastructure"]
readme = "README.md"
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Topic :: Internet :: WWW/HTTP :: Indexing/Search",
]
dependencies = [
    "httpx>=0.27",
    "rich>=13.0",
    "fastapi>=0.115",
    "uvicorn>=0.30",
    "pydantic>=2.0",
    "python-multipart>=0.0.9",
    "psycopg2-binary>=2.9",
    "asyncpg>=0.29",
]

[project.optional-dependencies]
pg = ["asyncpg"]

[project.scripts]
market = "market_cli:main"
market-server = "market_server:main"
wongcli = "wongcli:main"

[tool.setuptools]
py-modules = ["market_cli", "market_server", "market_mcp", "wongcli", "market_stores", "market_core"]
