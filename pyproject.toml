[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "cli-market"
version = "1.0.8"
description = "CLI Market — 3,600+ retailers VTEX, 67 countries, 12 lines. Commerce infrastructure for AI agents."
requires-python = ">=3.10"
license = "MIT"
authors = [{name = "CLI Market", email = "hello@cli-market.dev"}]
keywords = ["vtex", "mcp", "ai-agents", "ecommerce", "cli", "retail", "commerce", "infrastructure"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Topic :: Internet :: WWW/HTTP :: Indexing/Search",
]
dependencies = [
    "httpx>=0.27",
    "rich>=13.0",
    "fastapi>=0.115",
    "uvicorn>=0.30",
    "pydantic>=2.0",
]

[project.scripts]
market = "market_cli:main"
market-server = "market_server:main"
wongcli = "wongcli:main"

[tool.setuptools]
py-modules = ["market_cli", "market_server", "market_mcp", "wongcli"]
