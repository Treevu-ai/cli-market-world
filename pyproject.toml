[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "cli-market"
version = "1.4.1"
description = "CLI Market — Commerce infrastructure for AI agents. 30 retailers, 7 countries, 3 platforms. 36 MCP tools. 13,000+ real prices every 8h. MIT."
requires-python = ">=3.10"
license = "MIT"
authors = [{name = "CLI Market", email = "hello@cli-market.dev"}]
keywords = ["vtex", "mcp", "ai-agents", "ecommerce", "cli", "retail", "commerce", "infrastructure"]
readme = "README.md"
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Topic :: Internet :: WWW/HTTP :: Indexing/Search",
]
dependencies = [
    "httpx>=0.27",
    "rich>=13.0",
    "fastapi>=0.115",
    "uvicorn>=0.30",
    "pydantic>=2.0",
    "python-multipart>=0.0.9",
    "psycopg2-binary>=2.9",
    "asyncpg>=0.29",
]

[project.optional-dependencies]
pg = ["asyncpg"]

[project.scripts]
market = "market_cli:main"
market-server = "market_server:main"

[tool.setuptools]
py-modules = ["market_cli", "market_server", "market_mcp", "market_stores", "market_core"]

[tool.ruff]
line-length = 120
target-version = "py310"
extend-exclude = [
    "landing/",
    ".market/",
    "dist/",
    "build/",
    "*.egg-info/",
]

[tool.ruff.lint]
# Focused on correctness, not style. Add rule families incrementally as the
# codebase matures. Current scope:
#   F   = pyflakes      (unused imports, undefined names, redefinitions)
#   E9  = pycodestyle   (real syntax errors, IndentationError, etc.)
#   W6  = pycodestyle   (deprecation warnings)
#   B   = bugbear       (mutable default args, except-pass, etc.)
select = ["F", "E9", "W6", "B"]
ignore = [
    "B008",   # FastAPI uses function calls in defaults (Header(None), Body(...))
    "B904",   # raise from inside except — common pattern here, not always wrong
]

[tool.ruff.lint.per-file-ignores]
# Tests intentionally import market_core after env setup — the E402 rule
# would force module-level imports to be reordered, breaking the test isolation.
"tests/*" = ["E402", "F401"]
