# Railway config for the API service (FastAPI)
#
# For the collector service, create a separate service in the
# Railway dashboard and set its Dockerfile path to "Dockerfile.collector".
#
# Add PostgreSQL from Railway dashboard → auto-injects DATABASE_URL

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
numReplicas = 1
