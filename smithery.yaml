name: CLI Market
description: >
  Commerce infrastructure for AI agents — search, compare, and track prices
  across 41 verified retailers in 8 countries (PE, AR, BR, MX, CO, CL, IT, FR).
  61,000+ verified prices updated every 4 hours. Free tier available.
  27 curated MCP tools for price search, basket comparison, alerts, and market intelligence.
homepage: https://cli-market.dev
license: MIT
categories:
  - ecommerce
  - data
  - finance
tags:
  - prices
  - ecommerce
  - latam
  - retail
  - market-data
  - mcp
  - commerce

startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      apiKey:
        type: string
        description: "CLI Market API key (get one at cli-market.dev). Leave empty to use the free tier (100 queries/day)."
    required: []
  commandFunction: |-
    (config) => ({
      command: "uvx",
      args: ["--from", "cli-market", "market-mcp"],
      env: config.apiKey ? { MARKET_API_KEY: config.apiKey } : {}
    })
