startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      apiKey:
        type: string
        description: "CLI Market API key (get one at cli-market.dev). Leave empty to use the free tier."
    required: []
  commandFunction: |-
    (config) => ({
      command: "uvx",
      args: ["--from", "cli-market", "market-mcp"],
      env: config.apiKey ? { MARKET_API_KEY: config.apiKey } : {}
    })
