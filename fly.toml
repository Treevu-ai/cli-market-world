# Fly.io config — CLI Market API service
# Docs: https://fly.io/docs/reference/configuration/
#
# Deploy (build secret required — never pass the PAT as --build-arg,
# it gets persisted in plaintext in `fly config show`):
#   fly deploy --app cli-market-api --config fly.toml --build-secret github_token=$GITHUB_TOKEN

app = "cli-market-api"
primary_region = "gru"   # São Paulo — closest to PE/MX/CO/AR/CL

[build]
  dockerfile = "Dockerfile"

[env]
  MARKET_DATA_DIR = "/data"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false   # API debe estar siempre up
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 150

[[vm]]
  size = "shared-cpu-1x"
  memory = "1024mb"

[[restart]]
  policy = "always"
  max_retries = 10

[mounts]
  source = "cli_market_data"
  destination = "/data"

[[services.tcp_checks]]
  interval = "30s"
  timeout = "10s"
  grace_period = "60s"

[checks]
  [checks.health]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    path = "/health"
    port = 8080
    timeout = "5s"
    type = "http"
